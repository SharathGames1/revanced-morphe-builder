name: Patch Dolphin APK

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

concurrency:
  group: dolphin-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📦 Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # ☕ Setup Java (for apktool + apksigner)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 🔧 Install dependencies (no Java needed here)
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq unzip wget zip

      # ⚡ Install latest Apktool via GitHub API
      - name: Install latest Apktool
        run: |
          API_JSON=$(curl -s https://api.github.com/repos/iBotPeaches/Apktool/releases/latest)
          JAR_URL=$(echo "$API_JSON" | jq -r '.assets[] | select(.name | test("apktool_.*\\.jar$")) | .browser_download_url')
          echo "Downloading Apktool from: $JAR_URL"
          wget -q https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          wget -q "$JAR_URL" -O apktool.jar
          chmod +x apktool
          sudo mv apktool /usr/local/bin/apktool
          sudo mv apktool.jar /usr/local/bin/apktool.jar

      # ✅ Verify Apktool
      - name: Verify Apktool
        run: |
          file /usr/local/bin/apktool.jar
          java -jar /usr/local/bin/apktool.jar --version

      # 🔧 Install Android Build Tools for apksigner
      - name: Install Android Build Tools
        run: |
          mkdir -p $HOME/android && cd $HOME/android
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d cmdline-tools
          mkdir -p $HOME/android/cmdline-tools/latest
          mv $HOME/android/cmdline-tools/cmdline-tools/* $HOME/android/cmdline-tools/latest/
          export ANDROID_SDK_ROOT=$HOME/android
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_SDK_ROOT "build-tools;34.0.0"
          export PATH=$ANDROID_SDK_ROOT/build-tools/34.0.0:$PATH
          echo "PATH=$PATH" >> $GITHUB_ENV

      # 🔍 Find latest Dolphin dev build
      - name: Find latest Dolphin build
        run: |
          APK_URL=$(curl -s https://dolphin-emu.org/download/ \
            | grep -Eo 'https://dl\.dolphin-emu\.org/builds/[a-z0-9/]+/dolphin-master-[0-9]+-[0-9]+\.apk' \
            | awk -F'[-/.]' '{
              v=$(NF-2); b=$(NF-1);
              if (v>V || (v==V && b>B)) {V=v; B=b; U=$0}
            } END{print U}')
          NAME=$(basename "$APK_URL")
          echo "APK_URL=$APK_URL" >> $GITHUB_ENV
          echo "NAME=$NAME" >> $GITHUB_ENV

      # 📦 Get latest dolphin-only release
      - name: Get latest dolphin release
        run: |
          LAST=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases \
            | jq -r '[.[] | select(.name | startswith("dolphin"))][0].name // ""')
          echo "LAST=$LAST" >> $GITHUB_ENV

      # ⏹ Stop if already processed
      - name: Stop if up-to-date
        if: env.NAME == env.LAST
        run: exit 0

      # ⬇️ Download APK
      - name: Download APK
        run: curl -L "$APK_URL" -o dolphin.apk

      # 📂 Decompile
      - name: Decompile APK
        run: apktool d dolphin.apk -o dolphin-src

      # ✏️ Patch apktool.yml
      - name: Patch targetSdkVersion
        run: |
          sed -i 's/targetSdkVersion: [0-9]*/targetSdkVersion: 34/' dolphin-src/apktool.yml

      # 🔨 Rebuild
      - name: Rebuild APK
        run: apktool b dolphin-src -o dolphin-patched.apk

      # 🔍 Verify build output
      - name: Verify APK
        run: |
          if [ ! -f dolphin-patched.apk ]; then
            echo "Build failed!"
            exit 1
          fi

      # 🔐 Restore BKS keystore from secret
      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE }}" | base64 -d > keystore.bks

      # ✒️ Sign APK
      - name: Sign APK
        run: |
          apksigner sign \
            --ks keystore.bks \
            --ks-type BKS \
            --ks-key-alias "${{ secrets.KEYSTORE_ALIAS }}" \
            --ks-pass pass:${{ secrets.KEYSTORE_PASS }} \
            --out signed-dolphin.apk \
            dolphin-patched.apk

      # ✅ Verify APK signature
      - name: Verify signature
        run: apksigner verify signed-dolphin.apk

      # 🧹 Delete old dolphin releases
      - name: Cleanup old dolphin releases
        run: |
          curl -s https://api.github.com/repos/${{ github.repository }}/releases \
          | jq -c '.[] | select(.name | startswith("dolphin")) | {id: .id, tag: .tag_name}' \
          | while read rel; do
              ID=$(echo "$rel" | jq -r '.id')
              TAG=$(echo "$rel" | jq -r '.tag')
              if [ "$TAG" != "${{ env.NAME }}" ]; then
                curl -s -X DELETE \
                  -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                  https://api.github.com/repos/${{ github.repository }}/releases/$ID
                curl -s -X DELETE \
                  -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                  https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$TAG
              fi
            done

      # 🚀 Publish release
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NAME }}
          name: ${{ env.NAME }}
          files: signed-dolphin.apk      - name: Stop if up-to-date
        if: env.NAME == env.LAST
        run: exit 0

      # ⬇️ Download APK
      - name: Download APK
        run: curl -L "$APK_URL" -o dolphin.apk

