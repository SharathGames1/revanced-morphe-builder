name: Patch Dolphin APK

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: dolphin-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Install apktool
        run: |
          curl -sLO https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool
          curl -sLO https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.4.jar
          chmod +x apktool
          sudo mv apktool /usr/local/bin/apktool
          sudo mv apktool_2.9.4.jar /usr/local/bin/apktool.jar

      # 🔍 Find latest dev build
      - name: Find latest Dolphin build
        run: |
          APK_URL=$(curl -s https://dolphin-emu.org/download/ \
            | grep -Eo 'https://dl\.dolphin-emu\.org/builds/[a-z0-9/]+/dolphin-master-[0-9]+-[0-9]+\.apk' \
            | awk -F'[-/.]' '{v=$(NF-2); b=$(NF-1); if (v>V || (v==V && b>B)) {V=v; B=b; U=$0}} END{print U}')
          NAME=$(basename "$APK_URL")
          echo "APK_URL=${APK_URL}" >> $GITHUB_ENV
          echo "NAME=${NAME}" >> $GITHUB_ENV

      # 📦 Latest dolphin release
      - name: Get latest dolphin release title
        run: |
          LATEST=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases \
            | jq -r '[.[] | select(.name | startswith("dolphin"))][0].name // ""')
          echo "LATEST=${LATEST}" >> $GITHUB_ENV

      # ⏹ Skip if already patched
      - name: Stop if up-to-date
        if: env.NAME == env.LATEST
        run: exit 0

      - name: Download latest
        run: curl -L "${{ env.APK_URL }}" -o dolphin.apk

      - name: Decompile APK
        run: apktool d dolphin.apk -o dolphin-src

      # ✏️ Edit apktool.yml instead of AndroidManifest.xml
      - name: Patch targetSdkVersion
        run: |
          sed -i 's/targetSdkVersion: [0-9]*/targetSdkVersion: 34/' dolphin-src/apktool.yml

      - name: Rebuild APK
        run: apktool b dolphin-src -o dolphin-patched.apk

      # ✒️ Recreate BKS keystore from secret
      - name: Restore keystore
        run: echo "${{ secrets.KEYSTORE }}" | base64 -d > keystore.bks

      - name: Sign APK
        run: |
          apksigner sign \
            --ks keystore.bks \
            --ks-type BKS \
            --ks-key-alias "${{ secrets.KEYSTORE_ALIAS }}" \
            --ks-pass pass:${{ secrets.KEYSTORE_PASS }} \
            --out signed-dolphin.apk \
            dolphin-patched.apk

      # 🧹 Delete previous "dolphin" releases
      - name: Delete old dolphin releases
        run: |
          curl -s https://api.github.com/repos/${{ github.repository }}/releases \
            | jq -c '.[] | select(.name | startswith("dolphin")) | {id: .id, tag: .tag_name}' \
            | while read r; do
                ID=$(echo "$r" | jq -r '.id')
                TAG=$(echo "$r" | jq -r '.tag')
                if [ "$TAG" != "${{ env.NAME }}" ]; then
                  curl -s -X DELETE \
                    -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                    https://api.github.com/repos/${{ github.repository }}/releases/$ID
                  curl -s -X DELETE \
                    -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                    https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$TAG
                fi
              done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NAME }}
          name: ${{ env.NAME }}
          files: signed-dolphin.apk
